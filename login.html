<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Login / Daftar - Telur Ayam Nusantara.</title>
    <style>
        /* Pengaturan Dasar */
        body { font-family: Arial, sans-serif; margin: 0; background-color: #e0f7fa; padding-bottom: 50px; }
        header { background-color: #ff9800; color: white; padding: 15px 50px; display: flex; justify-content: space-between; align-items: center; }
        nav a { color: white; text-decoration: none; margin-left: 20px; font-weight: bold; }
        
        /* Pengaturan Kotak Autentikasi */
        .auth-container {
            max-width: 400px;
            margin: 60px auto;
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        
        /* Tombol Tab (Masuk vs Daftar) */
        .tab-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
            border-bottom: 2px solid #ddd;
        }
        .tab-btn {
            background: none;
            border: none;
            padding: 10px 20px;
            font-size: 18px;
            font-weight: bold;
            color: #777;
            cursor: pointer;
            width: 50%;
            transition: color 0.3s, border-bottom 0.3s;
        }
        .tab-btn.active {
            color: #2196F3; /* Warna biru sesuai gambar kamu */
            border-bottom: 3px solid #2196F3;
        }

        /* Form Input */
        .form-group { margin-bottom: 15px; text-align: left; }
        .form-group label { display: block; font-weight: bold; margin-bottom: 5px; color: #333; font-size: 14px; }
        .form-group input, .form-group select, .form-group textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            box-sizing: border-box;
            font-size: 14px;
        }
        
        /* Tombol Aksi */
       .btn-submit {
            background-color: #2196F3;
            color: white;
            padding: 12px;
            border: none;
            border-radius: 8px;
            width: 100%;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.3s ease, transform 0.2s ease; /* Efek transisi */
        }
        
        .btn-submit:hover { 
            background-color: #1976D2; 
            transform: scale(1.02); /* Efek membesar */
            }
    </style>
</head>
<body>

    <header>
        <h1>🥚 Telur Ayam Nusantara</h1>
        <nav>
            <a href="index.html">Beranda</a>
            <a href="katalog.html">Katalog</a>
            <a href="tracking.html">Tracking</a>
            <a href="login.html">Login / Daftar</a>
        </nav>
    </header>

    <div class="auth-container">
        
        <div class="tab-header">
            <button id="btn-login" class="tab-btn active" onclick="bukaTab('login')">Masuk</button>
            <button id="btn-daftar" class="tab-btn" onclick="bukaTab('daftar')">Daftar</button>
        </div>

        <form id="form-login">
            <div class="form-group">
                <label>Masuk Sebagai</label>
                <select required>
                    <option value="pembeli">Pembeli</option>
                    <option value="peternak">Peternak</option>
                </select>
            </div>
            <div class="form-group">
                <label>Username</label>
                <input type="text" placeholder="Masukkan Username" required>
            </div>
            <div class="form-group">
                <label>Kata Sandi</label>
                <input type="password" placeholder="Masukkan kata sandi" required>
            </div>
            <button type="button" class="btn-submit" onclick="simulasiLogin()">Masuk</button>
        </form>

        <form id="form-daftar" style="display: none;">
            <div class="form-group">
                <label>Daftar Sebagai</label>
                <select required>
                    <option value="pembeli">Pembeli</option>
                    <option value="peternak">Peternak</option>
                </select>
            </div>
            <div class="form-group">
                <label>Nama Lengkap</label>
                <input type="text" id="reg-nama" placeholder="Sesuai KTP" required>
            </div>
            <div class="form-group">
                <label>Nomor WhatsApp</label>
                <input type="tel" id="reg-wa" placeholder="Contoh: 085777774111" required>
            </div>
            <div class="form-group">
                <label>Alamat Lengkap</label>
                <textarea id="reg-alamat" rows="3" placeholder="Nama Jalan, RT/RW, Kelurahan, Kecamatan, Kota" required></textarea>
            </div>
            <div class="form-group">
                <label>Kata Sandi Baru</label>
                <input type="password" placeholder="Buat kata sandi" required>
            </div>
            <button type="button" class="btn-submit" onclick="simulasiDaftar()">Daftar Sekarang</button>
        </form>

    </div>

    <script>
        // Fungsi untuk berpindah antara tab Masuk dan Daftar
        function bukaTab(jenisTab) {
            let formLogin = document.getElementById("form-login");
            let formDaftar = document.getElementById("form-daftar");
            let btnLogin = document.getElementById("btn-login");
            let btnDaftar = document.getElementById("btn-daftar");

            if (jenisTab === 'login') {
                formLogin.style.display = "block";
                formDaftar.style.display = "none";
                btnLogin.classList.add("active");
                btnDaftar.classList.remove("active");
            } else {
                formLogin.style.display = "none";
                formDaftar.style.display = "block";
                btnLogin.classList.remove("active");
                btnDaftar.classList.add("active");
            }
        }

        // Fungsi simulasi saat tombol Masuk diklik
        function simulasiLogin() {
            alert("Berhasil Masuk Ke Akun Anda! Mengalihkan ke Halaman Beranda");
            window.location.href = "index.html"; // Otomatis pindah ke beranda setelah login
        }

        // Fungsi simulasi saat tombol Daftar diklik
        function simulasiDaftar() {
            let nama = document.getElementById("reg-nama").value;
            let wa = document.getElementById("reg-wa").value;
            let alamat = document.getElementById("reg-alamat").value;

            if (nama === "" || wa === "" || alamat === "") {
                alert("Harap lengkapi Nama, Nomor WA, dan Alamat terlebih dahulu!");
            } else {
                alert(`Pendaftaran Berhasil!\nSelamat datang, ${nama}. Akun Anda telah aktif.`);
                // Setelah daftar berhasil, otomatis pindahkan kembali ke tab Login
                bukaTab('login');
            }
        }
    </script>

</body>
</html>
